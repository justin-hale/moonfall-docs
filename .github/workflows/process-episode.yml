name: Process Episode

on:
  schedule:
    # Saturday 10:00 EDT (14:00 UTC)
    - cron: '0 14 * * 6'
  workflow_dispatch:
    inputs:
      drive_file_id:
        description: 'Override: Google Drive file ID (skip auto-detect)'
        required: false
        default: ''
      episode_number:
        description: 'Override: episode number (skip auto-detect)'
        required: false
        default: ''
      session_date:
        description: 'Override: session date YYYY-MM-DD (skip filename parse)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — log what would happen without executing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DRIVE_FILE_ID: ${{ github.event.inputs.drive_file_id || '' }}
      EPISODE_NUMBER: ${{ github.event.inputs.episode_number || '' }}
      SESSION_DATE: ${{ github.event.inputs.session_date || '' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      DRIVE_FOLDER_ID: ${{ vars.DRIVE_FOLDER_ID || '14EVI64FlpZCwRy4UL4ZhGjlsjK55XL1h' }}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      OMELAS_PAT: ${{ secrets.OMELAS_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install google-api-python-client google-auth

      - name: Setup ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Create workspace directory
        run: mkdir -p workspace

      # ── Auto-detect: find newest Drive file with no matching release ──
      - name: Detect episode
        id: detect
        env:
          GH_TOKEN: ${{ secrets.OMELAS_PAT }}
        run: python scripts/ci_process.py detect

      # ── Exit early if nothing new or dry run ──
      - name: Check for skip
        if: env.SKIP == 'true'
        run: |
          echo "No new episodes found. Exiting."
          exit 0

      - name: Dry run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "=== DRY RUN ==="
          echo "EPISODE_NUMBER : $EPISODE_NUMBER"
          echo "DRIVE_FILE_ID  : $DRIVE_FILE_ID"
          echo "SESSION_DATE   : $SESSION_DATE"
          echo "Would download, extract, release, update-feed, open-pr"
          echo "Exiting (dry run)."
          exit 0

      # ── Download ──
      - name: Download video from Drive
        if: env.SKIP != 'true' && env.DRY_RUN != 'true'
        run: python scripts/ci_process.py download

      # ── Extract ──
      - name: Extract MP3 + SRT
        if: env.SKIP != 'true' && env.DRY_RUN != 'true'
        run: python scripts/ci_process.py extract

      # ── Free disk space ──
      - name: Delete source video
        if: env.SKIP != 'true' && env.DRY_RUN != 'true'
        run: rm -f workspace/source_video.*

      # ── GitHub release ──
      - name: Create GitHub release
        if: env.SKIP != 'true' && env.DRY_RUN != 'true' && env.RELEASE_EXISTS != 'true'
        env:
          GH_TOKEN: ${{ secrets.OMELAS_PAT }}
        run: python scripts/ci_process.py release

      # ── RSS feed ──
      - name: Update RSS feed
        if: env.SKIP != 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.OMELAS_PAT }}
        run: python scripts/ci_process.py update-feed

      # ── moonfall-docs PR ──
      - name: Open notes PR on moonfall-docs
        if: env.SKIP != 'true' && env.DRY_RUN != 'true'
        # GH CLI requires GH_TOKEN to be set; give it the built-in token.  this
        # can be overridden by supplying a different secret in GH_TOKEN if you
        # really have a PAT that works here (see script comments/retry logic).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ci_process.py open-pr

      # ── Cleanup on failure ──
      - name: Delete release if pipeline failed
        # only delete if we ourselves created the release in this run, not if
        # the release already existed (latter case has RELEASE_EXISTS='true')
        if: failure() && env.SKIP != 'true' && env.DRY_RUN != 'true' && env.RELEASE_CREATED_THIS_RUN == 'true'
        env:
          GH_TOKEN: ${{ secrets.OMELAS_PAT }}
        run: python scripts/ci_process.py delete-release

      # ── Save registry (runs even on partial failure) ──
      - name: Commit episode registry
        if: always() && env.SKIP != 'true' && env.DRY_RUN != 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # make sure we're back on the default branch; the open-pr step switches
          # to an srt/* branch which then caused future pushes to fail with a
          # missing upstream.  checking out main avoids that.
          git checkout main || true
          git add data/episodes.json
          if git diff --cached --quiet; then
            echo "No registry changes to commit."
          else
            git commit -m "Update episode registry [automated]"
            git push
          fi

      - name: Summary
        if: env.SKIP != 'true' && env.DRY_RUN != 'true'
        run: |
          echo "=== Pipeline complete ==="
          echo "Episode  : $EPISODE_NUMBER"
          echo "Date     : $SESSION_DATE"
          echo "Release  : https://github.com/topherhooper/omelas-stories/releases/tag/v$EPISODE_NUMBER"
          echo ""
          echo "Next step: Merge the SRT PR on justin-hale/moonfall-docs to trigger notes generation."
          echo "After merge: python aftershow.py generate $EPISODE_NUMBER --date $SESSION_DATE"
